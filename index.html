<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Expensify | Personal Finance Dashboard</title>
   
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
   <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">
   
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
       <header>
           <div class="logo">
               <div class="logo-icon">
                   <i class="fas fa-coins"></i>
               </div>
               <h1>Expensify</h1>
           </div>
           <div class="date-display">
               <i class="far fa-calendar-alt"></i>
               <span id="current-date"></span>
           </div>
       </header>
      
       <div class="dashboard-grid">
           <div class="card balance-card">
               <div class="balance-label">CURRENT BALANCE</div>
               <div class="balance-amount" id="net-balance">₹0.00</div>
               <div class="income-expense-container">
                   <div class="income-display">
                       <div class="income-icon">
                           <i class="fas fa-arrow-down"></i>
                       </div>
                       <div class="amount-details">
                           <h4>INCOME</h4>
                           <div class="amount" id="total-income">₹0.00</div>
                       </div>
                   </div>
                   <div class="expense-display">
                       <div class="expense-icon">
                           <i class="fas fa-arrow-up"></i>
                       </div>
                       <div class="amount-details">
                           <h4>EXPENSES</h4>
                           <div class="amount" id="total-expenses">₹0.00</div>
                       </div>
                   </div>
               </div>
           </div>
          
           <div class="card add-transaction-card">
               <div class="card-title">
                   <i class="fas fa-plus-circle"></i>
                   <span id="form-title">Add Transaction</span>
               </div>
               <div class="type-toggle">
                   <button id="type-income" class="active">Income</button>
                   <button id="type-expense">Expense</button>
               </div>
               <form id="transaction-form">
                   <input type="hidden" id="edit-id" value="">

                   <div class="form-group">
                       <label for="description">Description</label>
                       <input type="text" id="description" class="form-control" placeholder="Salary, Groceries, Bills..." required>
                   </div>
                   <div class="form-group">
                       <label for="amount">Amount (₹)</label>
                       <input type="number" id="amount" class="form-control" placeholder="0.00" min="0.01" step="0.01" required>
                   </div>
                   <div class="form-group">
                       <label for="category">Category</label>
                       <div class="input-group">
                           <select id="category" class="form-control" required>
                               <option value="">Select a category</option>
                           </select>
                           <button type="button" id="add-category-btn" class="btn btn-icon" title="Add New Category">
                               <i class="fas fa-plus"></i>
                           </button>
                       </div>
                   </div>
                   <div class="form-group">
                       <label for="date">Date</label>
                       <input type="date" id="date" class="form-control" required>
                   </div>
                   
                   <div class="btn-group">
                       <button type="submit" id="submit-btn" class="btn btn-primary">
                           <i class="fas fa-check"></i> Add Transaction
                       </button>
                       <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display: none;">
                           <i class="fas fa-times"></i> Cancel
                       </button>
                   </div>
               </form>
           </div>
          
           <div class="card summary-card">
               <div class="card-title">
                   <i class="fas fa-chart-pie"></i>
                   Financial Summary
               </div>
               <div class="summary-grid">
                   <div class="summary-item">
                       <div class="summary-label">
                           <i class="fas fa-wallet"></i>
                           <span>Daily Average (This Month)</span>
                       </div>
                       <div class="summary-value neutral" id="daily-average">₹0.00</div>
                   </div>
                   <div class="summary-item">
                       <div class="summary-label">
                           <i class="fas fa-piggy-bank"></i>
                           <span>Savings Rate</span>
                       </div>
                       <div class="summary-value positive" id="savings-rate">0%</div>
                   </div>
                   <div class="summary-item">
                       <div class="summary-label">
                           <i class="fas fa-calendar-day"></i>
                           <span>Transactions</span>
                       </div>
                       <div class="summary-value neutral" id="transaction-count">0</div>
                   </div>
                   <div class="summary-item">
                       <div class="summary-label">
                           <i class="fas fa-chart-line"></i>
                           <span>Largest Expense</span>
                       </div>
                       <div class="summary-value negative" id="largest-expense">₹0.00</div>
                   </div>
               </div>
              
               <div class="financial-health">
                   <div class="health-meter">
                       <canvas id="health-meter"></canvas>
                       <div class="health-value" id="health-score">50</div>
                   </div>
                   <div>
                       <div class="health-label">Financial Health Score</div>
                       <div class="health-text" id="health-text">Calculating...</div>
                   </div>
               </div>
           </div>
          
           <div class="card visualization-card">
               <div class="card-title">
                   <i class="fas fa-chart-bar"></i>
                   Expense Breakdown
               </div>
               <div class="chart-container">
                   <canvas id="expense-chart"></canvas>
               </div>
           </div>
          
           <div class="card transactions-card">
               <div class="card-title">
                   <i class="fas fa-history"></i>
                   Recent Transactions
               </div>
               <div class="transactions-list" id="transactions-list">
                   </div>
           </div>
          
           <div class="card categories-card">
               <div class="card-title">
                   <i class="fas fa-tags"></i>
                   Spending by Category
               </div>
               <div class="categories-container" id="categories-container">
                   </div>
           </div>
       </div>
      
       <div class="footer">
          
           <p><a href="#" id="reset-data">Reset Data</a></p>
       </div>
   </div>

   <script src="script.js"></script>
</body>
</html>
